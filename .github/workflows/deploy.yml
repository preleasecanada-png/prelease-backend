name: Deploy Backend to AWS Lambda

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, json, bcmath, curl, gd, zip
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Generate Laravel Passport keys
        # Lambda's /var/task is read-only, so passport:keys cannot run at
        # runtime. Generate keys here so they ship inside the deployment zip.
        # NOTE: This regenerates keys on every deploy, which invalidates all
        # existing OAuth tokens. To preserve tokens across deploys, store the
        # keys as GitHub Secrets and write them to disk instead of generating.
        run: |
          mkdir -p storage
          php artisan passport:keys --force
        env:
          APP_KEY: ${{ secrets.APP_KEY }}

      - name: Refresh autoloader
        # Ensure any newly added classes since the last composer install are discoverable
        run: composer dump-autoload --optimize --no-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Serverless Framework
        run: npm install -g serverless@3.38.0

      - name: Deploy to AWS Lambda
        run: serverless deploy --stage production
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          KIRI_API_KEY: ${{ secrets.KIRI_API_KEY }}
          KIRI_WEBHOOK_SECRET: ${{ secrets.KIRI_WEBHOOK_SECRET }}

      - name: Run Migrations
        run: serverless bref:cli --args="migrate --force" --stage production
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          KIRI_API_KEY: ${{ secrets.KIRI_API_KEY }}
          KIRI_WEBHOOK_SECRET: ${{ secrets.KIRI_WEBHOOK_SECRET }}
