name: Deploy Backend to AWS Lambda

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, json, bcmath, curl, gd, zip
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Write Laravel Passport keys from secrets
        # Lambda's /var/task is read-only, so the keys must be in the deploy zip.
        # We use static keys stored in GitHub Secrets so OAuth tokens stay valid
        # across deploys. If the secrets are missing, we fall back to generating
        # fresh keys (which will invalidate all existing tokens).
        run: |
          mkdir -p storage
          if [ -n "$OAUTH_PRIVATE_KEY" ] && [ -n "$OAUTH_PUBLIC_KEY" ]; then
            echo "Using OAuth keys from secrets"
            printf '%s' "$OAUTH_PRIVATE_KEY" > storage/oauth-private.key
            printf '%s' "$OAUTH_PUBLIC_KEY" > storage/oauth-public.key
            chmod 600 storage/oauth-private.key
            chmod 644 storage/oauth-public.key
          else
            echo "WARNING: OAUTH_*_KEY secrets missing — generating fresh keys (invalidates tokens)"
            php artisan passport:keys --force
          fi
        env:
          APP_KEY: ${{ secrets.APP_KEY }}
          OAUTH_PRIVATE_KEY: ${{ secrets.OAUTH_PRIVATE_KEY }}
          OAUTH_PUBLIC_KEY: ${{ secrets.OAUTH_PUBLIC_KEY }}

      - name: Refresh autoloader
        # Ensure any newly added classes since the last composer install are discoverable
        run: composer dump-autoload --optimize --no-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Serverless Framework
        run: npm install -g serverless@3.38.0

      - name: Deploy to AWS Lambda
        run: serverless deploy --stage production
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          KIRI_API_KEY: ${{ secrets.KIRI_API_KEY }}
          KIRI_WEBHOOK_SECRET: ${{ secrets.KIRI_WEBHOOK_SECRET }}

      - name: Run Migrations
        run: serverless bref:cli --args="migrate --force" --stage production
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          APP_KEY: ${{ secrets.APP_KEY }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          KIRI_API_KEY: ${{ secrets.KIRI_API_KEY }}
          KIRI_WEBHOOK_SECRET: ${{ secrets.KIRI_WEBHOOK_SECRET }}
