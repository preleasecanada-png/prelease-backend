service: prelease-api

provider:
  name: aws
  region: us-east-1
  stage: production
  runtime: provided.al2023
  memorySize: 1024
  timeout: 28
  environment:
    APP_ENV: production
    APP_DEBUG: false
    APP_STORAGE: /tmp/storage
    VIEW_COMPILED_PATH: /tmp/storage/framework/views
    CACHE_DRIVER: array
    SESSION_DRIVER: array
    LOG_CHANNEL: stderr
    QUEUE_CONNECTION: sqs
    FRONTEND_URL: https://dev.preleasecanada.ca
    FILESYSTEM_DISK: s3
    SQS_PREFIX: !Ref JobsQueue

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:*
          Resource:
            - !Sub 'arn:aws:s3:::${self:custom.s3Bucket}'
            - !Sub 'arn:aws:s3:::${self:custom.s3Bucket}/*'
        - Effect: Allow
          Action:
            - sqs:*
          Resource:
            - !GetAtt JobsQueue.Arn

custom:
  s3Bucket: prelease-storage-${self:provider.stage}

package:
  patterns:
    - '!node_modules/**'
    - '!public/storage/**'
    - '!resources/js/**'
    - '!storage/**'
    - '!tests/**'
    - '!.env.example'
    - '!phpunit.xml'
    - '!vite.config.js'
    - '!README.md'
    - '!.git/**'
    - '!.github/**'
    # Exclude composer phar/cache
    - '!composer.phar'
    - '!composer.lock'
    - '!vendor/composer/ca-bundle/**'
    - '!vendor/composer/pcre/**'
    # Exclude Google API services src/ (114MB, thousands of files) but keep autoload.php
    - '!vendor/google/apiclient-services/src/**'
    - 'vendor/google/apiclient-services/src/Oauth2.php'
    - 'vendor/google/apiclient-services/src/Oauth2/**'
    - 'vendor/google/apiclient-services/src/PeopleService.php'
    - 'vendor/google/apiclient-services/src/PeopleService/**'
    # Exclude vendor test/doc files
    - '!vendor/**/tests/**'
    - '!vendor/**/test/**'
    - '!vendor/**/Tests/**'
    - '!vendor/**/Test/**'
    - '!vendor/**/*.md'
    - '!vendor/**/LICENSE'
    - '!vendor/**/CHANGELOG*'
    - '!vendor/**/README*'
    - '!vendor/**/doc/**'
    - '!vendor/**/docs/**'
    # Exclude AWS SDK services not needed
    - '!vendor/aws/aws-sdk-php/src/data/[a-qs-z]*/**'
    - 'vendor/aws/aws-sdk-php/src/data/s3/**'
    - 'vendor/aws/aws-sdk-php/src/data/sqs/**'
    - 'vendor/aws/aws-sdk-php/src/data/sts/**'

functions:
  web:
    handler: public/index.php
    runtime: php-83-fpm
    events:
      - httpApi: '*'
    timeout: 28

  artisan:
    handler: artisan
    runtime: php-83-console
    timeout: 120

  worker:
    handler: Bref\LaravelBridge\Queue\QueueHandler
    runtime: php-83
    events:
      - sqs:
          arn: !GetAtt JobsQueue.Arn
          batchSize: 1
    timeout: 60

resources:
  Resources:
    # S3 Bucket for file storage (property images, documents, etc.)
    StorageBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.s3Bucket}
        CorsConfiguration:
          CorsRules:
            - AllowedHeaders: ['*']
              AllowedMethods: [GET, PUT, POST, DELETE]
              AllowedOrigins: ['*']
              MaxAge: 3600

    # SQS Queue for background jobs (emails, notifications)
    JobsQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-jobs
        VisibilityTimeout: 120
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
          maxReceiveCount: 3

    DeadLetterQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-dlq

plugins:
  - ./vendor/bref/bref
