service: prelease-api
useDotenv: true

provider:
  name: aws
  region: us-east-1
  stage: production
  runtime: provided.al2023
  memorySize: 1024
  timeout: 28
  httpApi:
    cors:
      allowedOrigins:
        - https://www.preleasecanada.ca
        - https://preleasecanada.ca
        - https://dev.preleasecanada.ca
        - http://localhost:3000
      allowedHeaders:
        - Content-Type
        - Authorization
        - Accept
      allowedMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        - PATCH
      maxAge: 86400
      allowCredentials: true
  environment:
    APP_ENV: production
    APP_DEBUG: false
    APP_KEY: ${env:APP_KEY}
    DB_CONNECTION: mysql
    DB_HOST: ${env:DB_HOST}
    DB_PORT: ${env:DB_PORT}
    DB_DATABASE: ${env:DB_DATABASE}
    DB_USERNAME: ${env:DB_USERNAME}
    DB_PASSWORD: ${env:DB_PASSWORD}
    APP_STORAGE: /tmp/storage
    VIEW_COMPILED_PATH: /tmp/storage/framework/views
    CACHE_DRIVER: array
    SESSION_DRIVER: array
    LOG_CHANNEL: stderr
    QUEUE_CONNECTION: sqs
    FRONTEND_URL: https://dev.preleasecanada.ca
    FILESYSTEM_DISK: s3
    SQS_PREFIX: !Ref JobsQueue
    # S3 storage. Lambda's IAM role provides credentials, and the runtime
    # automatically sets AWS_DEFAULT_REGION / AWS_REGION (reserved keys),
    # so we only need to point at the bucket here.
    AWS_BUCKET: ${self:custom.s3Bucket}
    # --- Mail ---
    MAIL_MAILER: smtp
    MAIL_HOST: smtp.gmail.com
    MAIL_PORT: 587
    MAIL_USERNAME: ${env:MAIL_USERNAME}
    MAIL_PASSWORD: ${env:MAIL_PASSWORD}
    MAIL_ENCRYPTION: tls
    MAIL_FROM_ADDRESS: ${env:MAIL_FROM_ADDRESS, 'preleasecanada@gmail.com'}
    MAIL_FROM_NAME: 'PreLease Canada'
    # --- Google OAuth ---
    GOOGLE_CLIENT_ID: ${env:GOOGLE_CLIENT_ID}
    GOOGLE_CLIENT_SECRET: ${env:GOOGLE_CLIENT_SECRET}
    GOOGLE_REDIRECT_URL: ${env:GOOGLE_REDIRECT_URL}
    # --- Pusher (real-time chat) ---
    BROADCAST_DRIVER: pusher
    PUSHER_APP_ID: ${env:PUSHER_APP_ID}
    PUSHER_APP_KEY: ${env:PUSHER_APP_KEY}
    PUSHER_APP_SECRET: ${env:PUSHER_APP_SECRET}
    PUSHER_APP_CLUSTER: ${env:PUSHER_APP_CLUSTER, 'mt1'}
    # --- OpenAI ---
    OPENAI_API_KEY: ${env:OPENAI_API_KEY, ''}
    OPENAI_MODEL: ${env:OPENAI_MODEL, 'gpt-4o-mini'}
    # --- Groq ---
    GROQ_API_KEY: ${env:GROQ_API_KEY, ''}
    GROQ_MODEL: ${env:GROQ_MODEL, 'llama-3.3-70b-versatile'}
    # --- Twilio ---
    TWILIO_ACCOUNT_SID: ${env:TWILIO_ACCOUNT_SID, ''}
    TWILIO_AUTH_TOKEN: ${env:TWILIO_AUTH_TOKEN, ''}
    TWILIO_PHONE_NUMBER: ${env:TWILIO_PHONE_NUMBER, ''}
    TWILIO_API_KEY_SID: ${env:TWILIO_API_KEY_SID, ''}
    TWILIO_API_KEY_SECRET: ${env:TWILIO_API_KEY_SECRET, ''}
    # --- Stripe ---
    STRIPE_KEY: ${env:STRIPE_KEY, ''}
    STRIPE_SECRET: ${env:STRIPE_SECRET, ''}
    STRIPE_WEBHOOK_SECRET: ${env:STRIPE_WEBHOOK_SECRET, ''}
    # --- KIRI Engine (3D Gaussian Splatting) ---
    KIRI_API_KEY: ${env:KIRI_API_KEY, ''}
    KIRI_WEBHOOK_SECRET: ${env:KIRI_WEBHOOK_SECRET, ''}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
            - s3:DeleteObject
            - s3:ListBucket
          Resource:
            - !Sub 'arn:aws:s3:::${self:custom.s3Bucket}'
            - !Sub 'arn:aws:s3:::${self:custom.s3Bucket}/*'
        - Effect: Allow
          Action:
            - sqs:SendMessage
            - sqs:ReceiveMessage
            - sqs:DeleteMessage
            - sqs:GetQueueAttributes
            - sqs:ChangeMessageVisibility
          Resource:
            - !GetAtt JobsQueue.Arn
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource: '*'

custom:
  s3Bucket: prelease-storage-production

package:
  patterns:
    - '!node_modules/**'
    - '!public/storage/**'
    - '!resources/js/**'
    - '!storage/**'
    - 'storage/oauth-private.key'
    - 'storage/oauth-public.key'
    - '!tests/**'
    - '!.env.example'
    - '!phpunit.xml'
    - '!vite.config.js'
    - '!README.md'
    - '!.git/**'
    - '!.github/**'
    # Exclude composer phar/cache
    - '!composer.phar'
    - '!composer.lock'
    - '!vendor/composer/ca-bundle/**'
    - '!vendor/composer/pcre/**'
    # Exclude Google API services src/ (114MB, thousands of files) but keep autoload.php
    - '!vendor/google/apiclient-services/src/**'
    - 'vendor/google/apiclient-services/src/Oauth2.php'
    - 'vendor/google/apiclient-services/src/Oauth2/**'
    - 'vendor/google/apiclient-services/src/PeopleService.php'
    - 'vendor/google/apiclient-services/src/PeopleService/**'
    # Exclude vendor test/doc files
    - '!vendor/**/tests/**'
    - '!vendor/**/test/**'
    - '!vendor/**/Tests/**'
    - '!vendor/**/Test/**'
    - '!vendor/**/*.md'
    - '!vendor/**/LICENSE'
    - '!vendor/**/CHANGELOG*'
    - '!vendor/**/README*'
    - '!vendor/**/doc/**'
    - '!vendor/**/docs/**'
    # Exclude AWS SDK data subdirs not needed (keep root files + s3, sqs, sts, ses)
    - '!vendor/aws/aws-sdk-php/src/data/**'
    - 'vendor/aws/aws-sdk-php/src/data/*'
    - 'vendor/aws/aws-sdk-php/src/data/s3/**'
    - 'vendor/aws/aws-sdk-php/src/data/sqs/**'
    - 'vendor/aws/aws-sdk-php/src/data/sts/**'
    - 'vendor/aws/aws-sdk-php/src/data/ses/**'
    # Exclude only unused AWS SDK service directories (keep all core + S3/Sqs/Sts/Ses)
    - '!vendor/aws/aws-sdk-php/src/S3Control/**'
    - '!vendor/aws/aws-sdk-php/src/Script/**'
    - '!vendor/aws/aws-sdk-php/src/SesV2/**'

functions:
  web:
    handler: public/index.php
    runtime: php-83-fpm
    events:
      - httpApi: '*'
    timeout: 28

  artisan:
    handler: artisan
    runtime: php-83-console
    timeout: 120

  worker:
    handler: Bref\LaravelBridge\Queue\QueueHandler
    runtime: php-83
    events:
      - sqs:
          arn: !GetAtt JobsQueue.Arn
          batchSize: 1
    timeout: 60

resources:
  Resources:
    # NOTE: S3 bucket `prelease-storage-production` already exists in us-east-1.
    # We reference it via AWS_BUCKET env var, not via CloudFormation, to avoid
    # "AlreadyExists" errors on every deploy. The bucket was created manually
    # before this serverless config existed.

    # SQS Queue for background jobs (emails, notifications)
    JobsQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-jobs
        VisibilityTimeout: 120
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt DeadLetterQueue.Arn
          maxReceiveCount: 3

    DeadLetterQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-dlq

plugins:
  - ./vendor/bref/bref
